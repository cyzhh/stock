<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日A股复盘 · 量化选股</title>
  <style>
    :root {
      --bg: #0b0f1a;
      --card: #141b2d;
      --card-inner: #0d1220;
      --text: #eef2f8;
      --muted: #8b95a8;
      --accent: #38bdf8;
      --accent2: #a78bfa;
      /* A 股习惯：红涨绿跌 */
      --rise: #ef4444;
      --fall: #22c55e;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --gold: #f59e0b;
      --border: rgba(255, 255, 255, 0.07);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }
    .page { max-width: 1180px; margin: 0 auto; padding: 32px 20px 80px; }
    .hero {
      text-align: center; margin-bottom: 24px; padding: 28px 20px 24px;
      background: linear-gradient(135deg, rgba(56,189,248,0.12), rgba(167,139,250,0.08));
      border: 1px solid var(--border); border-radius: 16px;
    }
    .hero h1 { font-size: clamp(1.6rem, 4vw, 2.2rem); font-weight: 800; margin-bottom: 8px; letter-spacing: 0.02em; }
    .hero .tagline { color: var(--muted); font-size: 0.92rem; margin-bottom: 6px; }
    .hero .meta-line { color: #94a3b8; font-size: 0.78rem; }
    .tool-nav {
      display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
      margin-bottom: 22px;
    }
    .tool-link {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; border-radius: 20px; font-size: 0.8rem;
      background: var(--card); border: 1px solid var(--border); color: var(--text);
      text-decoration: none; transition: border-color 0.15s, background 0.15s;
    }
    .tool-link:hover { border-color: var(--accent); background: rgba(56,189,248,0.08); }
    .tool-link.primary { border-color: rgba(56,189,248,0.45); color: var(--accent); }
    header { text-align: center; margin-bottom: 28px; }
    header h1 { font-size: clamp(1.5rem, 4vw, 2rem); font-weight: 700; margin-bottom: 12px; }
    header p { color: var(--muted); font-size: 0.9rem; }
    .metrics-row {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px; margin-bottom: 24px;
    }
    .metric-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 16px 18px; text-align: center;
    }
    .metric-value { font-size: 1.6rem; font-weight: 800; color: var(--accent); line-height: 1.2; }
    .metric-value.up { color: var(--rise); }
    .metric-value.down { color: var(--fall); }
    .metric-label { font-size: 0.82rem; color: var(--text); margin-top: 6px; font-weight: 600; }
    .metric-sub { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }
    .view-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .view-tab {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      padding: 8px 18px; border-radius: 24px; cursor: pointer; font-size: 0.86rem;
    }
    .view-tab.active, .view-tab:hover {
      border-color: var(--accent); color: var(--text); background: rgba(79,172,254,0.12);
    }
    .panel { display: none; }
    .panel.active { display: block; }
    .stats-bar { text-align: center; color: var(--muted); font-size: 0.8rem; margin-bottom: 16px; }
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 18px 22px; margin-bottom: 18px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    }
    .card h2 { font-size: 0.95rem; margin-bottom: 14px; color: #b8c5d9; }
    .stock-card { border-color: rgba(79,172,254,0.2); }
    .stock-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      flex-wrap: wrap; gap: 8px; margin-bottom: 14px;
    }
    .stock-title { font-size: 1.05rem; font-weight: 700; }
    .stock-code { color: var(--muted); font-size: 0.82rem; margin-left: 8px; }
    .price-badge {
      font-size: 1.2rem; font-weight: 800;
      padding: 4px 12px; border-radius: 8px;
      background: rgba(79,172,254,0.15); color: var(--accent);
    }
    .price-badge.up { background: rgba(239,68,68,0.15); color: var(--rise); }
    .price-badge.down { background: rgba(34,197,94,0.15); color: var(--fall); }
    .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .tag {
      font-size: 0.76rem; padding: 4px 10px; border-radius: 16px; font-weight: 600;
    }
    .tag.buy { background: rgba(239,68,68,0.18); color: #f87171; border: 1px solid rgba(239,68,68,0.35); }
    .tag.neutral { background: rgba(148,163,184,0.15); color: #94a3b8; border: 1px solid var(--border); }
    .tag.warn { background: rgba(234,179,8,0.18); color: #facc15; border: 1px solid rgba(234,179,8,0.35); }
    .tag.sell { background: rgba(34,197,94,0.18); color: #4ade80; border: 1px solid rgba(34,197,94,0.35); }
    .ind-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px; margin-top: 12px;
    }
    .ind-item {
      background: var(--card-inner); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px; text-align: center;
    }
    .ind-val { font-size: 1rem; font-weight: 700; color: var(--accent); }
    .ind-label { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }
    .table-wrap {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      overflow: hidden; margin-bottom: 18px;
    }
    .table-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 600; background: rgba(0,0,0,0.15); }
    tr:hover td { background: rgba(79,172,254,0.06); }
    .toolbar {
      display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
      justify-content: center; margin-bottom: 16px; padding: 14px 16px;
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    }
    .toolbar input, .toolbar select {
      background: var(--card-inner); border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); padding: 10px 12px; font-size: 0.88rem;
    }
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    @media (max-width: 900px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }
    .section-title {
      font-size: 0.95rem; font-weight: 700; color: #b8c5d9;
      margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between;
    }
    .section-title a { font-size: 0.75rem; color: var(--accent); text-decoration: none; font-weight: 500; }
    .sentiment-panel {
      display: grid; grid-template-columns: 200px 1fr; gap: 20px; align-items: center;
    }
    @media (max-width: 700px) { .sentiment-panel { grid-template-columns: 1fr; } }
    .sentiment-ring {
      width: 160px; height: 160px; margin: 0 auto; border-radius: 50%;
      background: conic-gradient(var(--rise) calc(var(--pct) * 1%), rgba(255,255,255,0.06) 0);
      display: flex; align-items: center; justify-content: center; position: relative;
    }
    .sentiment-ring::before {
      content: ""; position: absolute; inset: 14px; border-radius: 50%; background: var(--card);
    }
    .sentiment-inner { position: relative; text-align: center; z-index: 1; }
    .sentiment-inner .val { font-size: 2rem; font-weight: 800; color: var(--rise); line-height: 1; }
    .sentiment-inner .lbl { font-size: 0.82rem; color: var(--muted); margin-top: 4px; }
    .bucket-bars { display: flex; align-items: flex-end; gap: 6px; height: 120px; padding-top: 8px; }
    .bucket-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 0; }
    .bucket-bar {
      width: 100%; max-width: 48px; border-radius: 4px 4px 0 0; min-height: 4px;
      background: linear-gradient(180deg, var(--rise), rgba(239,68,68,0.35));
    }
    .bucket-bar.down { background: linear-gradient(180deg, var(--fall), rgba(34,197,94,0.35)); }
    .bucket-label { font-size: 0.68rem; color: var(--muted); text-align: center; }
    .bucket-count { font-size: 0.72rem; font-weight: 700; color: var(--text); }
    .harvest-block {
      background: linear-gradient(135deg, rgba(245,158,11,0.08), rgba(56,189,248,0.06));
      border: 1px solid rgba(245,158,11,0.2); border-radius: 12px; padding: 16px 18px;
    }
    .harvest-block h3 { font-size: 0.88rem; color: var(--gold); margin-bottom: 10px; }
    .harvest-block ul { list-style: none; font-size: 0.84rem; color: #cbd5e1; }
    .harvest-block li { padding: 6px 0; border-bottom: 1px solid var(--border); }
    .harvest-block li:last-child { border-bottom: none; }
    .theme-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
    .theme-card {
      background: var(--card-inner); border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 16px; position: relative; overflow: hidden;
    }
    .theme-card::before {
      content: attr(data-rank); position: absolute; top: 10px; right: 12px;
      font-size: 1.4rem; font-weight: 800; color: rgba(255,255,255,0.06);
    }
    .theme-card .name { font-size: 0.95rem; font-weight: 700; margin-bottom: 8px; }
    .theme-card .stats { font-size: 0.78rem; color: var(--muted); display: flex; flex-wrap: wrap; gap: 10px; }
    .theme-card .leaders { margin-top: 8px; font-size: 0.78rem; color: #94a3b8; }
    .flow-badge {
      display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.72rem; font-weight: 600;
    }
    .flow-badge.up { background: rgba(239,68,68,0.15); color: var(--rise); }
    .flow-badge.down { background: rgba(34,197,94,0.15); color: var(--fall); }
    .sector-block { margin-bottom: 16px; }
    .sector-block h4 { font-size: 0.8rem; color: var(--muted); margin-bottom: 8px; }
    .sector-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 10px; border-radius: 8px; margin-bottom: 6px;
      background: rgba(0,0,0,0.15); font-size: 0.8rem;
    }
    .sector-row strong { font-weight: 600; }
    .sector-row .leader { color: var(--muted); font-size: 0.72rem; }
    .ladder-tier { margin-bottom: 14px; }
    .ladder-tier-head {
      display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
      font-size: 0.82rem; color: var(--muted);
    }
    .ladder-tier-head .boards {
      background: rgba(56,189,248,0.15); color: var(--accent);
      padding: 2px 10px; border-radius: 12px; font-weight: 700;
    }
    .ladder-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .ladder-chip {
      padding: 6px 12px; border-radius: 8px; font-size: 0.78rem;
      background: var(--card-inner); border: 1px solid var(--border);
    }
    .ladder-chip.fail { opacity: 0.45; text-decoration: line-through; }
    .hotmoney-row {
      display: flex; justify-content: space-between; padding: 8px 0;
      border-bottom: 1px solid var(--border); font-size: 0.82rem;
    }
    .hotmoney-row:last-child { border-bottom: none; }
    .theme-list { display: flex; flex-direction: column; gap: 10px; }
    .theme-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 12px; background: var(--card-inner); border-radius: 8px;
      border: 1px solid var(--border); flex-wrap: wrap; gap: 8px;
    }
    .news-item { padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 0.84rem; }
    .news-item:last-child { border-bottom: none; }
    .news-time { color: var(--muted); font-size: 0.75rem; margin-right: 8px; }
    footer {
      text-align: center; color: var(--muted); font-size: 0.75rem;
      margin-top: 32px; padding-top: 20px; border-top: 1px solid var(--border);
    }
    footer a { color: var(--accent); text-decoration: none; }
    .reason { font-size: 0.82rem; color: var(--muted); margin-top: 8px; }
    .score-bar { display: flex; align-items: center; gap: 8px; min-width: 100px; }
    .score-track { flex: 1; height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
    .factor-chip {
      font-size: 0.72rem; padding: 3px 8px; border-radius: 10px;
      background: rgba(79,172,254,0.1); color: #93c5fd; border: 1px solid rgba(79,172,254,0.22);
    }
    .score-fill { height: 100%; background: linear-gradient(90deg, #4facfe, #00f2fe); border-radius: 3px; }
    .composite-badge {
      font-size: 0.88rem; font-weight: 700; color: #fbbf24;
      margin-left: 8px;
    }
    .pattern-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 8px; max-height: 320px; overflow-y: auto; padding: 4px;
    }
    .pattern-check {
      display: flex; align-items: center; gap: 8px; font-size: 0.78rem;
      padding: 6px 10px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--card-inner); cursor: pointer;
    }
    .pattern-check input { accent-color: var(--accent); }
    .pattern-check.active { border-color: var(--accent); background: rgba(79,172,254,0.1); }
    .pattern-preset {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      padding: 6px 12px; border-radius: 16px; cursor: pointer; font-size: 0.78rem;
    }
    .pattern-preset:hover, .pattern-preset.active {
      border-color: var(--accent); color: var(--text);
    }
    .pattern-preset:hover, .pattern-preset.active {
      border-color: var(--accent); color: var(--text);
    }
    .flow-hbar { margin-bottom: 12px; }
    .flow-hbar-head { display: flex; justify-content: space-between; font-size: 0.78rem; margin-bottom: 4px; }
    .flow-hbar-track { height: 22px; background: rgba(255,255,255,0.06); border-radius: 6px; overflow: hidden; }
    .flow-hbar-fill { height: 100%; border-radius: 6px; display: flex; align-items: center; padding: 0 8px; font-size: 0.72rem; font-weight: 700; min-width: 48px; }
    .flow-hbar-fill.in { background: linear-gradient(90deg, #dc2626, #ef4444); }
    .flow-hbar-fill.out { background: linear-gradient(90deg, #16a34a, #22c55e); justify-content: flex-end; margin-left: auto; }
    .flow-hbar-meta { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
    .report-section { margin-bottom: 18px; }
    .report-section h3 { font-size: 0.9rem; color: var(--accent); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    .report-section ul { list-style: none; font-size: 0.84rem; color: #cbd5e1; line-height: 1.65; }
    .report-section li { padding: 6px 0 6px 14px; position: relative; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .report-section li::before { content: "▸"; position: absolute; left: 0; color: var(--accent); }
    .report-section li strong { color: var(--text); }
    .mood-badge {
      display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 0.82rem; font-weight: 700;
      background: rgba(56,189,248,0.15); color: var(--accent); border: 1px solid rgba(56,189,248,0.35);
    }
    .mood-badge.attack { background: rgba(239,68,68,0.15); color: var(--rise); border-color: rgba(239,68,68,0.35); }
    .mood-badge.defense { background: rgba(34,197,94,0.15); color: var(--fall); border-color: rgba(34,197,94,0.35); }
    .anomaly-card {
      padding: 10px 14px; border-radius: 8px; margin-bottom: 8px; font-size: 0.8rem;
      border-left: 3px solid var(--accent);
      background: rgba(56,189,248,0.06);
    }
    .anomaly-card.warn { border-color: var(--yellow); background: rgba(234,179,8,0.08); }
    .anomaly-card.danger { border-color: var(--red); background: rgba(239,68,68,0.08); }
    .anomaly-card .atype { font-size: 0.72rem; color: var(--muted); margin-bottom: 4px; }
    .trend-mini { display: flex; gap: 8px; align-items: flex-end; height: 80px; margin-top: 8px; }
    .trend-col { flex: 1; text-align: center; min-width: 0; }
    .trend-bar-wrap { display: flex; gap: 3px; align-items: flex-end; justify-content: center; height: 56px; }
    .trend-bar { width: 10px; border-radius: 3px 3px 0 0; min-height: 4px; }
    .trend-bar.curr { background: var(--accent); }
    .trend-bar.prev { background: rgba(255,255,255,0.2); }
    .trend-delta { font-size: 0.68rem; margin-top: 4px; }
    .trend-delta.up { color: var(--rise); }
    .trend-delta.down { color: var(--fall); }
    .rank-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .rank-table th, .rank-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); text-align: left; }
    .rank-table th { color: var(--muted); font-weight: 600; background: rgba(0,0,0,0.12); }
    .rank-num {
      display: inline-flex; width: 26px; height: 26px; align-items: center; justify-content: center;
      border-radius: 6px; font-weight: 800; font-size: 0.78rem;
      background: rgba(56,189,248,0.15); color: var(--accent);
    }
    .rank-num.gold { background: rgba(245,158,11,0.2); color: var(--gold); }
    .spark-row { display: flex; align-items: flex-end; gap: 2px; height: 36px; min-width: 120px; }
    .spark-bar { width: 5px; border-radius: 2px 2px 0 0; min-height: 2px; }
    .spark-bar.pos { background: var(--rise); }
    .spark-bar.neg { background: var(--fall); }
    .board-toggle { display: flex; gap: 8px; margin-bottom: 14px; }
    .board-toggle button {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      padding: 6px 14px; border-radius: 16px; cursor: pointer; font-size: 0.8rem;
    }
    .board-toggle button.active { border-color: var(--accent); color: var(--text); background: rgba(56,189,248,0.1); }
    @media (max-width: 600px) {
      .stock-header { flex-direction: column; }
    }
    /* 周线 BBI 分析 */
    .kline-chart-box {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 12px; margin-bottom: 18px; height: 420px;
    }
    .kline-subtabs {
      display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 16px;
    }
    .kline-subtab {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      padding: 6px 16px; border-radius: 18px; cursor: pointer; font-size: 0.82rem;
    }
    .kline-subtab.active, .kline-subtab:hover {
      border-color: var(--accent); color: var(--text); background: rgba(56,189,248,0.1);
    }
    .phase-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 18px 20px; margin-bottom: 14px;
    }
    .phase-card.bull { border-color: rgba(239,68,68,0.25); }
    .phase-card.bear { border-color: rgba(34,197,94,0.25); }
    .phase-card.neutral { border-color: rgba(234,179,8,0.25); }
    .phase-card.active-phase { box-shadow: 0 0 0 1px var(--accent); }
    .phase-head {
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 8px; margin-bottom: 10px;
    }
    .phase-head h3 { font-size: 0.95rem; font-weight: 700; }
    .phase-range { font-size: 0.78rem; color: var(--muted); }
    .signal-box {
      background: var(--card-inner); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 16px; margin-bottom: 12px;
    }
    .signal-box.bear { border-left: 3px solid var(--fall); }
    .signal-box.bull { border-left: 3px solid var(--rise); }
    .signal-box h4 { font-size: 0.88rem; margin-bottom: 8px; color: var(--text); }
    .signal-box ul { list-style: none; font-size: 0.82rem; color: #cbd5e1; }
    .signal-box li { padding: 4px 0 4px 12px; position: relative; }
    .signal-box li::before { content: "•"; position: absolute; left: 0; color: var(--accent); }
    .level-table td:last-child { text-align: right; color: var(--muted); font-size: 0.78rem; }
    .bbi-arrow.up::after { content: " ↑"; color: var(--rise); }
    .bbi-arrow.down::after { content: " ↓"; color: var(--fall); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
  <div class="page">
    <div class="hero">
      <h1 id="page-title">每日 A 股复盘</h1>
      <p class="tagline">量化概览 · 情绪温度 · 主题脉搏 · 资金踪迹</p>
      <p class="meta-line" id="page-subtitle"></p>
    </div>
    <nav class="tool-nav" id="tool-nav"></nav>
    <div class="metrics-row" id="metrics-row"></div>
    <div class="view-tabs">
      <button class="view-tab active" data-view="market">📊 市场概览</button>
      <button class="view-tab" data-view="fundflow">💰 资金流向</button>
      <button class="view-tab" data-view="sector20">📈 板块20日</button>
      <button class="view-tab" data-view="picks">🎯 策略选股</button>
      <button class="view-tab" data-view="indicators">📈 个股指标</button>
      <button class="view-tab" data-view="patterns">🕯️ K线形态</button>
      <button class="view-tab" data-view="klinebbi">📉 周线BBI</button>
      <button class="view-tab" data-view="backtest">🔬 回测验证</button>
    </div>
    <div class="stats-bar" id="stats-bar"></div>
    <div class="panel active" id="market-panel"></div>
    <div class="panel" id="fundflow-panel"></div>
    <div class="panel" id="sector20-panel"></div>
    <div class="panel" id="picks-panel"></div>
    <div class="panel" id="indicators-panel"></div>
    <div class="panel" id="patterns-panel"></div>
    <div class="panel" id="klinebbi-panel"></div>
    <div class="panel" id="backtest-panel"></div>
    <footer>
      行情数据来自 <a href="https://hhxg.top" target="_blank" rel="noopener">恢恢量化 hhxg.top</a>
      · 策略参考 <a href="https://github.com/myhhub/stock" target="_blank" rel="noopener">InStock</a>
      · 仅供学习研究，非投资建议
    </footer>
  </div>
  <script>
    const DATA = /*__DASHBOARD__*/;
    let activeView = "market";
    let pickSearch = "";
    let indSearch = "";
    const PATTERN_REGISTRY = DATA.patterns?.registry || [];
    const LS_KEY = "stock_quant_pattern_filter";
    let selectedPatterns = new Set(JSON.parse(localStorage.getItem(LS_KEY) || "null") || PATTERN_REGISTRY.map(p => p.id));
    let patternSignalFilter = localStorage.getItem("stock_quant_pattern_signal") || "all";
    let patternSearch = "";
    let klineSymbol = DATA.weekly_bbi?.default_symbol || "515080";
    let klineSubView = "overview";
    let klineChart = null;

    function getKlineReport() {
      const reports = DATA.weekly_bbi?.reports || [];
      return reports.find(r => r.code === klineSymbol) || reports.find(r => r.ok) || null;
    }

    function pctClass(v) {
      if (v == null || v === "") return "";
      return Number(v) >= 0 ? "up" : "down";
    }

    function fmtPct(v) {
      if (v == null || v === "") return "—";
      const n = Number(v);
      return (n >= 0 ? "+" : "") + n.toFixed(2) + "%";
    }

    function signalTag(label, type) {
      const cls = type || "neutral";
      return `<span class="tag ${cls}">${label}</span>`;
    }

    function renderToolNav() {
      const links = DATA.snapshot?.links || {};
      const defaults = [
        { key: "website", title: "恢恢量化日报", primary: true },
        { key: "hotmoney", title: "游资龙虎榜" },
        { key: "stock_picker", title: "量化筛选" },
        { key: "etf", title: "ETF 风向" },
        { key: "margin", title: "两融数据" },
      ];
      const items = defaults.map(d => {
        const item = links[d.key] || {};
        const url = item.url || (d.key === "website" ? "https://hhxg.top" : "#");
        const title = item.title || d.title;
        return `<a class="tool-link${d.primary ? " primary" : ""}" href="${url}" target="_blank" rel="noopener">${title} →</a>`;
      }).join("");
      document.getElementById("tool-nav").innerHTML = items;
    }

    function renderMetrics() {
      const m = DATA.snapshot?.market || {};
      const scan = DATA.scan || {};
      const bt = DATA.backtest?.overall || {};
      const provider = DATA.snapshot?.meta?.provider_name || "恢恢量化";
      document.getElementById("page-subtitle").textContent =
        `数据 ${DATA.market_date || "—"} · 来源 ${provider} · 生成 ${(DATA.generated_at || "").slice(0, 19).replace("T", " ")} UTC`;
      document.getElementById("metrics-row").innerHTML = `
        <div class="metric-card">
          <div class="metric-value ${(m.sentiment_index || 0) >= 60 ? "up" : ""}">${m.sentiment_index ?? "—"}${m.sentiment_index != null ? "%" : ""}</div>
          <div class="metric-label">赚钱效应</div>
          <div class="metric-sub">${m.sentiment_label || ""}${m.struct_diff != null ? ` · 结构差 +${m.struct_diff}pp` : ""}</div>
        </div>
        <div class="metric-card">
          <div class="metric-value up">${m.limit_up ?? "—"}</div>
          <div class="metric-label">涨停</div>
          <div class="metric-sub">炸板 ${m.fried ?? "—"} · 跌停 ${m.limit_down ?? "—"} · 晋级 ${m.promotion_rate || "—"}</div>
        </div>
        <div class="metric-card">
          <div class="metric-value">${scan.pick_count ?? 0}</div>
          <div class="metric-label">策略命中</div>
          <div class="metric-sub">扫描 ${scan.universe_size ?? 0} 只自选股</div>
        </div>
        <div class="metric-card">
          <div class="metric-value">${bt.best_profit_factor?.profit_factor ?? bt.best_strategy?.profit_factor ?? "—"}</div>
          <div class="metric-label">最优盈亏比</div>
          <div class="metric-sub">${bt.best_profit_factor?.name || bt.best_strategy?.name || "待回测"}</div>
        </div>`;
      renderToolNav();
    }

    function renderBucketChart(buckets) {
      if (!buckets?.length) return `<p style="color:var(--muted);font-size:0.82rem">暂无涨跌分布</p>`;
      const max = Math.max(...buckets.map(b => b.count || 0), 1);
      return `<div class="bucket-bars">${buckets.map(b => {
        const h = Math.round(((b.count || 0) / max) * 100);
        const cls = b.dir === "down" ? " down" : "";
        return `<div class="bucket-col">
          <div class="bucket-count">${b.count ?? "—"}</div>
          <div class="bucket-bar${cls}" style="height:${h}%"></div>
          <div class="bucket-label">${b.name || ""}</div>
        </div>`;
      }).join("")}</div>`;
    }

    function renderSectorGroups(sectors) {
      if (!sectors?.length) return `<p style="color:var(--muted);font-size:0.82rem">暂无行业/板块资金</p>`;
      return sectors.map(group => {
        const label = group.label || "板块";
        const strong = (group.strong || []).slice(0, 5);
        const weak = (group.weak || []).slice(0, 5);
        const row = (s, positive) => `
          <div class="sector-row">
            <div><strong>${s.name || "—"}</strong> <span class="leader">龙头 ${s.leader || "—"}</span></div>
            <div>
              <span class="${positive ? "up" : "down"}" style="font-weight:700">${s.net_yi != null ? (s.net_yi >= 0 ? "+" : "") + s.net_yi + "亿" : "—"}</span>
              <span style="color:var(--muted);margin-left:8px">${s.bias_pct != null ? (s.bias_pct >= 0 ? "+" : "") + s.bias_pct + "%" : ""}</span>
            </div>
          </div>`;
        return `<div class="sector-block">
          <h4>${label} · 强势 TOP5</h4>
          ${strong.map(s => row(s, true)).join("") || `<p style="color:var(--muted);font-size:0.78rem">—</p>`}
          <h4 style="margin-top:12px">${label} · 弱势 TOP5</h4>
          ${weak.map(s => row(s, false)).join("") || `<p style="color:var(--muted);font-size:0.78rem">—</p>`}
        </div>`;
      }).join("");
    }

    function renderLadderTiers(ladderDetail) {
      const levels = ladderDetail?.levels || [];
      if (!levels.length) return `<p style="color:var(--muted);font-size:0.82rem">暂无连板数据</p>`;
      const rates = ladderDetail.lb_rates_map || {};
      return levels.filter(l => l.boards > 0).map(level => {
        const stocks = level.stocks || [];
        const ok = stocks.filter(s => s.is_success !== false);
        const fail = stocks.filter(s => s.is_success === false);
        const rate = rates[String(level.boards)] || "";
        return `<div class="ladder-tier">
          <div class="ladder-tier-head">
            <span class="boards">${level.boards} 板</span>
            <span>晋级 ${ok.length} · 断板 ${fail.length}${rate ? ` · 晋级率 ${rate}` : ""}</span>
          </div>
          <div class="ladder-chips">
            ${ok.map(s => `<span class="ladder-chip">${s.name}<span style="color:var(--muted);margin-left:6px">${s.concept || s.industry || ""}</span></span>`).join("")}
            ${fail.map(s => `<span class="ladder-chip fail">${s.name}</span>`).join("")}
          </div>
        </div>`;
      }).join("");
    }

    function renderHotmoney(hm) {
      if (!hm?.top_net_buy?.length) return `<p style="color:var(--muted);font-size:0.82rem">暂无龙虎榜数据</p>`;
      const head = hm.total_net_yi != null
        ? `<p style="font-size:0.82rem;margin-bottom:10px">单日净买入 <strong style="color:var(--rise)">${hm.total_net_yi} 亿</strong></p>` : "";
      const rows = hm.top_net_buy.slice(0, 6).map(s => `
        <div class="hotmoney-row">
          <span>${s.name || "—"}</span>
          <span><strong class="up">+${s.net_yi ?? "—"}亿</strong> <span style="color:var(--muted)">${s.ratio_pct != null ? s.ratio_pct + "%" : ""}</span></span>
        </div>`).join("");
      return head + rows;
    }

    function renderHarvest(detail) {
      if (!detail || !Object.keys(detail).length) return "";
      const items = [
        ["market_state", "定调"],
        ["focus_direction", "资金方向"],
        ["theme_focus", "题材脉搏"],
        ["hotmoney_state", "游资踪迹"],
        ["news_highlight", "资讯要点"],
      ].filter(([k]) => detail[k]).map(([k, label]) => `<li><strong>${label}：</strong>${detail[k]}</li>`);
      if (!items.length) return "";
      return `<div class="harvest-block"><h3>今日核心收获</h3><ul>${items.join("")}</ul></div>`;
    }

    function renderMarket() {
      const snap = DATA.snapshot || {};
      const m = snap.market || {};
      const themes = snap.hot_themes || [];
      const ladderDetail = snap.ladder_detail || {};
      const ladderSum = snap.ladder_summary || {};
      const sectors = snap.sectors || [];
      const news = snap.news || [];
      const hm = snap.hotmoney || {};
      const cmp = snap.comparison || {};
      const pct = Math.min(100, Math.max(0, m.sentiment_index || 0));
      const upDown = m.buckets ? m.buckets.filter(b => b.dir === "up").reduce((a, b) => a + (b.count || 0), 0) : null;
      const downCnt = m.buckets ? m.buckets.filter(b => b.dir === "down").reduce((a, b) => a + (b.count || 0), 0) : null;

      const themeHtml = themes.length ? themes.slice(0, 6).map((t, i) => {
        const net = t.net_yi;
        const flowCls = net == null ? "" : (net >= 0 ? "up" : "down");
        const leaders = (t.top_stocks || t.leaders || []).map(l =>
          `${l.name}${l.net_yi != null ? ` <span class="flow-badge ${l.net_yi >= 0 ? "up" : "down"}">${l.net_yi >= 0 ? "+" : ""}${l.net_yi}亿</span>` : ""}`
        ).join(" · ");
        return `<div class="theme-card" data-rank="#${i + 1}">
          <div class="name">${t.name || t.theme || "—"}</div>
          <div class="stats">
            <span>涨停 <strong>${t.limitup_count ?? t.limit_up ?? t.count ?? "—"}</strong></span>
            ${net != null ? `<span class="flow-badge ${flowCls}">游资 ${net >= 0 ? "+" : ""}${net}亿</span>` : ""}
          </div>
          <div class="leaders">龙头 ${leaders || "—"}</div>
        </div>`;
      }).join("") : `<p style="color:var(--muted)">暂无题材数据</p>`;

      const newsHtml = news.length ? news.map(n => `
        <div class="news-item">
          <span class="news-time">${n.time || ""}${n.cat ? ` [${n.cat}]` : ""}</span>${n.title || ""}
        </div>`).join("") : `<p style="color:var(--muted)">暂无快讯</p>`;

      const conceptTags = Object.entries(ladderDetail.concept_counts || {}).slice(0, 6)
        .map(([k, v]) => `<span class="tag neutral">${k} ${v}</span>`).join("");

      document.getElementById("market-panel").innerHTML = `
        ${renderHarvest(snap.ai_summary_detail)}
        <div class="card">
          <div class="section-title"><span>赚钱效应 · ${m.date || DATA.market_date || ""}</span>
            <a href="https://hhxg.top" target="_blank" rel="noopener">完整日报 →</a></div>
          <div class="sentiment-panel">
            <div class="sentiment-ring" style="--pct:${pct}">
              <div class="sentiment-inner">
                <div class="val">${m.sentiment_index ?? "—"}${m.sentiment_index != null ? "%" : ""}</div>
                <div class="lbl">${m.sentiment_label || "情绪"}</div>
              </div>
            </div>
            <div>
              <div style="display:flex;flex-wrap:wrap;gap:16px;margin-bottom:12px;font-size:0.82rem;color:var(--muted)">
                <span>涨 <strong style="color:var(--rise)">${upDown ?? "—"}</strong></span>
                <span>跌 <strong style="color:var(--fall)">${downCnt ?? "—"}</strong></span>
                <span>涨停 <strong>${m.limit_up ?? "—"}</strong></span>
                <span>炸板率 ${m.fried && m.limit_up ? ((m.fried / (m.limit_up + m.fried)) * 100).toFixed(1) + "%" : "—"}</span>
                <span>最高 ${ladderSum.max_streak ?? "—"} 板 · ${ladderSum.top_streak?.name || ""}</span>
                ${cmp.yesterday?.limit_up != null ? `<span>昨涨停 ${cmp.yesterday.limit_up}</span>` : ""}
              </div>
              ${renderBucketChart(m.buckets)}
            </div>
          </div>
        </div>
        <div class="card">
          <div class="section-title"><span>题材热点</span></div>
          <div class="theme-grid">${themeHtml}</div>
          ${conceptTags ? `<div class="tags" style="margin-top:14px">${conceptTags}</div>` : ""}
        </div>
        <div class="grid-2">
          <div class="card">
            <div class="section-title"><span>行业 / 板块资金</span></div>
            ${renderSectorGroups(sectors)}
          </div>
          <div class="card">
            <div class="section-title"><span>游资龙虎榜</span>
              <a href="${snap.links?.hotmoney?.url || "https://hhxg.top/youzi.html"}" target="_blank" rel="noopener">详情 →</a></div>
            ${renderHotmoney(hm)}
          </div>
        </div>
        <div class="card">
          <div class="section-title"><span>连板天梯</span>
            <span style="font-size:0.75rem;font-weight:400;color:var(--muted)">涨停 ${ladderSum.total_limit_up ?? m.limit_up ?? "—"} · 晋级 ${m.promotion_rate || "—"}</span></div>
          ${renderLadderTiers(ladderDetail)}
        </div>
        ${snap.ai_summary ? `<div class="card"><div class="section-title"><span>市场摘要</span></div><p style="font-size:0.88rem;color:#cbd5e1;line-height:1.7">${snap.ai_summary}</p></div>` : ""}
        <div class="card"><div class="section-title"><span>焦点快讯</span></div>${newsHtml}</div>`;
    }

    function renderHBar(items, dir) {
      if (!items?.length) return `<p style="color:var(--muted);font-size:0.82rem">暂无数据</p>`;
      return items.map(it => {
        const val = it.value ?? 0;
        const label = dir === "in" ? `+${val}亿` : `${val}亿`;
        const meta = [it.bias_pct != null ? `涨跌 ${it.bias_pct >= 0 ? "+" : ""}${it.bias_pct}%` : "",
          it.leader ? `龙头 ${it.leader}` : ""].filter(Boolean).join(" · ");
        return `<div class="flow-hbar">
          <div class="flow-hbar-head"><span>${it.name}</span><span style="font-weight:700;color:${dir === "in" ? "var(--rise)" : "var(--fall)"}">${label}</span></div>
          <div class="flow-hbar-track"><div class="flow-hbar-fill ${dir}" style="width:${Math.max(it.pct || 0, 12)}%">${label}</div></div>
          ${meta ? `<div class="flow-hbar-meta">${meta}</div>` : ""}
        </div>`;
      }).join("");
    }

    function renderBucketTrend(buckets) {
      if (!buckets?.length) return "";
      const max = Math.max(...buckets.flatMap(b => [b.count || 0, b.prev || 0]), 1);
      return `<div class="trend-mini">${buckets.map(b => {
        const ch = Math.round(((b.count || 0) / max) * 56);
        const ph = Math.round(((b.prev || 0) / max) * 56);
        const d = b.delta || 0;
        const dCls = d >= 0 ? "up" : "down";
        return `<div class="trend-col">
          <div class="trend-bar-wrap">
            <div class="trend-bar prev" style="height:${ph}px" title="昨日 ${b.prev}"></div>
            <div class="trend-bar curr" style="height:${ch}px" title="今日 ${b.count}"></div>
          </div>
          <div class="bucket-label">${b.name}</div>
          <div class="trend-delta ${dCls}">${d >= 0 ? "+" : ""}${d}</div>
        </div>`;
      }).join("")}</div>`;
    }

    function renderReportPoint(text) {
      return text.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    }

    function renderFundFlow() {
      const r = DATA.fund_flow || {};
      const m = r.metrics || {};
      const charts = r.charts || {};
      const mood = r.mood || "—";
      const moodCls = mood === "积极进攻" ? "attack" : (mood === "防御撤退" ? "defense" : "");

      const kpi = `
        <div class="metrics-row" style="margin-bottom:18px">
          <div class="metric-card">
            <div class="metric-value">${m.sentiment ?? "—"}${m.sentiment != null ? "%" : ""}</div>
            <div class="metric-label">赚钱效应</div>
            <div class="metric-sub"><span class="mood-badge ${moodCls}">${mood}</span></div>
          </div>
          <div class="metric-card">
            <div class="metric-value up">${m.up_count ?? "—"}</div>
            <div class="metric-label">上涨家数</div>
            <div class="metric-sub">跌 ${m.down_count ?? "—"} · 比 ${m.up_down_ratio ?? "—"}</div>
          </div>
          <div class="metric-card">
            <div class="metric-value">${m.main_fund_weekly_yi != null ? (m.main_fund_weekly_yi >= 0 ? "+" : "") + m.main_fund_weekly_yi + "亿" : "—"}</div>
            <div class="metric-label">主力周累计</div>
            <div class="metric-sub">游资日净 ${m.hotmoney_net_yi != null ? m.hotmoney_net_yi + "亿" : "—"}</div>
          </div>
          <div class="metric-card">
            <div class="metric-value">${m.concentration || "—"}</div>
            <div class="metric-label">板块风格</div>
            <div class="metric-sub">炸板率 ${m.fried_rate != null ? m.fried_rate + "%" : "—"}</div>
          </div>
        </div>`;

      const anomalyHtml = (r.anomalies || []).map(a =>
        `<div class="anomaly-card ${a.level || ""}"><div class="atype">${a.type || "异动"}</div>${a.text || ""}</div>`
      ).join("") || `<p style="color:var(--muted);font-size:0.82rem">暂无明显异动</p>`;

      const themeBars = (charts.theme_flow || []).map(t => {
        const pos = (t.value || 0) >= 0;
        return `<div class="flow-hbar">
          <div class="flow-hbar-head"><span>${t.name} · 涨停${t.limitup ?? "—"}</span>
            <span style="color:${pos ? "var(--rise)" : "var(--fall)"}">${pos ? "+" : ""}${t.value}亿</span></div>
          <div class="flow-hbar-track"><div class="flow-hbar-fill ${pos ? "in" : "out"}" style="width:${Math.max(t.pct || 0, 10)}%"></div></div>
        </div>`;
      }).join("");

      const sectionsHtml = (r.sections || []).map(sec => `
        <div class="report-section">
          <h3>${sec.title || ""}</h3>
          <ul>${(sec.points || []).map(p => `<li>${renderReportPoint(p)}</li>`).join("")}</ul>
        </div>`).join("");

      document.getElementById("fundflow-panel").innerHTML = `
        <div class="card" style="border-color:rgba(56,189,248,0.25)">
          <div class="section-title"><span>${r.title || "A股每日资金流向复盘"}</span>
            <a href="https://hhxg.top" target="_blank" rel="noopener">完整数据 →</a></div>
          <p style="font-size:0.82rem;color:var(--muted);margin-bottom:12px">四维度资金面复盘 · 数据来源恢恢量化 · 仅供研究</p>
          ${kpi}
        </div>
        <div class="grid-2">
          <div class="card">
            <div class="section-title"><span>吸金先锋 TOP3</span></div>
            ${renderHBar(charts.sector_inflow, "in")}
          </div>
          <div class="card">
            <div class="section-title"><span>失血重灾区 TOP3</span></div>
            ${renderHBar(charts.sector_outflow, "out")}
          </div>
        </div>
        <div class="grid-2">
          <div class="card">
            <div class="section-title"><span>题材游资净额</span></div>
            ${themeBars || `<p style="color:var(--muted)">暂无</p>`}
          </div>
          <div class="card">
            <div class="section-title"><span>涨跌分布 · 近一日对比</span></div>
            <p style="font-size:0.78rem;color:var(--muted);margin-bottom:8px">灰柱=昨日 · 蓝柱=今日 · 数字为家数变化</p>
            ${renderBucketTrend(charts.bucket_trend)}
          </div>
        </div>
        <div class="card">
          <div class="section-title"><span>异常与异动信号</span></div>
          ${anomalyHtml}
        </div>
        <div class="card">
          <div class="section-title"><span>专业复盘报告</span></div>
          ${sectionsHtml || `<p style="color:var(--muted)">暂无报告</p>`}
        </div>`;
    }

    let sector20Board = "industry";

    function renderSparkline(series) {
      if (!series?.length) return "—";
      const vals = series.map(s => s.main_yi || 0);
      const max = Math.max(...vals.map(Math.abs), 1);
      return `<div class="spark-row">${vals.map(v => {
        const h = Math.max(Math.round(Math.abs(v) / max * 32), 2);
        return `<div class="spark-bar ${v >= 0 ? "pos" : "neg"}" style="height:${h}px" title="${v}亿"></div>`;
      }).join("")}</div>`;
    }

    function renderSector20Table(board) {
      const top = board?.top || [];
      if (!top.length) return `<p style="color:var(--muted);padding:20px">暂无板块数据，请运行 sync_sector_flow.py</p>`;
      const maxTotal = Math.max(...top.map(t => Math.abs(t.total_main_yi || 0)), 1);
      return `<table class="rank-table"><thead><tr>
        <th>排名</th><th>板块</th><th>近20日主力净流入</th><th>近5日</th><th>今日</th><th>涨跌%</th><th>20日走势</th>
      </thead><tbody>
      ${top.map(item => {
        const rankCls = item.rank <= 3 ? " gold" : "";
        const total = item.total_main_yi ?? 0;
        const w = Math.max(Math.round(Math.abs(total) / maxTotal * 100), 8);
        const totalColor = total >= 0 ? "var(--rise)" : "var(--fall)";
        const today = item.today_main_yi;
        const r5 = item.recent5_main_yi;
        return `<tr>
          <td><span class="rank-num${rankCls}">${item.rank}</span></td>
          <td><strong>${item.name}</strong><div style="font-size:0.7rem;color:var(--muted)">${item.code || ""}</div></td>
          <td>
            <div style="font-weight:800;color:${totalColor}">${total >= 0 ? "+" : ""}${total} 亿</div>
            <div class="flow-hbar-track" style="height:8px;margin-top:4px"><div class="flow-hbar-fill ${total >= 0 ? "in" : "out"}" style="width:${w}%;height:100%"></div></div>
          </td>
          <td class="${r5 >= 0 ? "up" : "down"}" style="font-weight:600">${r5 != null ? (r5 >= 0 ? "+" : "") + r5 + "亿" : "—"}</td>
          <td class="${(today || 0) >= 0 ? "up" : "down"}">${today != null ? (today >= 0 ? "+" : "") + today + "亿" : "—"}</td>
          <td class="${pctClass(item.change_pct)}">${item.change_pct != null ? (item.change_pct >= 0 ? "+" : "") + item.change_pct + "%" : "—"}</td>
          <td>${renderSparkline(item.series)}<div style="font-size:0.68rem;color:var(--muted)">${(item.series||[]).length}日样本</div></td>
        </tr>`;
      }).join("")}
      </tbody></table>`;
    }

    function factorBar(name, score) {
      if (score == null || score === undefined || score === "") {
        return `<div class="ind-item"><div class="ind-val">—</div><div class="ind-label">${name}</div></div>`;
      }
      const s = Number(score) || 0;
      return `<div class="ind-item">
        <div class="ind-val">${s.toFixed(0)}</div>
        <div class="ind-label">${name}</div>
        <div class="score-bar" style="margin-top:6px"><div class="score-track"><div class="score-fill" style="width:${s}%"></div></div></div>
      </div>`;
    }

    function renderStockCard(stock, showInd = false) {

      const sig = l.signals || {};
      const mf = stock.multi_factor || {};
      const factors = mf.factors || {};
      const factorLabels = { momentum: "动能", volume: "量能", trend: "趋势", pullback: "回调", reversal: "反转" };
      return `
        <div class="card stock-card">
          <div class="stock-header">
            <div>
              <span class="stock-title">${stock.name}</span>
              <span class="stock-code">${stock.code}</span>
              ${mf.composite_score != null ? `<span class="composite-badge">综合 ${mf.composite_score} · ${mf.signal_strength || ""}</span>` : ""}
            </div>
            <div>
              <span class="price-badge ${pctClass(chg)}">${l.close ?? "—"}</span>
              <span class="price-badge ${pctClass(chg)}" style="margin-left:6px;font-size:0.9rem">${fmtPct(chg)}</span>
            </div>
          </div>
          ${Object.keys(factors).length ? `<div class="player-chips" style="margin-top:8px">${Object.entries(factors).map(([k,v]) =>
            `<span class="factor-chip">${factorLabels[k] || k} ${Number(v).toFixed(0)}${mf.estimated ? "≈" : ""}</span>`).join("")}${mf.estimated ? `<span class="factor-chip" style="opacity:0.7">估算</span>` : ""}</div>` : ""}

            `<span class="tag ${p.signal > 0 ? "buy" : "sell"}">${p.name} · ${p.signal_label}</span>`).join("")}</div>` : ""}
          ${strategies.length ? `<div class="tags">${strategies.map(s =>
            `<span class="tag buy">${s.name} · ${s.score}分</span>`).join("")}</div>
            <div class="reason">${strategies[0].reason || ""}</div>` : `<div class="tags"><span class="tag neutral">暂无策略命中</span></div>`}
          ${showInd ? `
          <div class="ind-grid">
            ${factorBar("动能", factors.momentum)}
            ${factorBar("量能", factors.volume)}
            ${factorBar("趋势", factors.trend)}
            ${factorBar("回调", factors.pullback)}
            ${factorBar("反转", factors.reversal)}

            <div class="ind-item"><div class="ind-val">${l.rsi6?.toFixed?.(1) ?? "—"}</div><div class="ind-label">RSI6 ${sig.rsi || ""}</div></div>
            <div class="ind-item"><div class="ind-val">${l.macd_dif?.toFixed?.(3) ?? "—"}</div><div class="ind-label">MACD ${sig.macd || ""}</div></div>
            <div class="ind-item"><div class="ind-val">${l.volume_ratio?.toFixed?.(2) ?? "—"}</div><div class="ind-label">量比</div></div>
          </div>` : ""}
        </div>`;
    }

    function renderPicks() {
      const picks = (DATA.scan?.picks || []).filter(s => {
        if (!pickSearch.trim()) return true;
        const q = pickSearch.trim().toLowerCase();
        return (s.name || "").toLowerCase().includes(q) || (s.code || "").includes(q);
      });

        `多因子选股 ${picks.length} 只 · 涨停回调 / 高动能 / 多因子共振 + 经典策略`;

        <div class="toolbar">

    function renderIndicators() {
      const all = (DATA.scan?.all_results || []).filter(s => {

    function savePatternFilter() {
      localStorage.setItem(LS_KEY, JSON.stringify([...selectedPatterns]));
      localStorage.setItem("stock_quant_pattern_signal", patternSignalFilter);
    }

    function stockPatternHits(stock) {
      return (stock.pattern_hits || []).filter(h => selectedPatterns.has(h.id));
    }

    function renderPatterns() {
      const all = DATA.scan?.all_results || [];
      const engine = DATA.meta?.talib_available ? "TA-Lib 全量" : "纯Python子集";
      const filteredRegistry = PATTERN_REGISTRY.filter(p =>
        !patternSearch.trim() || p.name.includes(patternSearch) || p.id.includes(patternSearch)
      );

      const hits = all.filter(s => {
        const ph = stockPatternHits(s);
        if (!ph.length) return false;
        if (patternSignalFilter === "bullish") return ph.some(h => h.signal > 0);
        if (patternSignalFilter === "bearish") return ph.some(h => h.signal < 0);
        return true;
      });

      document.getElementById("stats-bar").textContent =
        `已选 ${selectedPatterns.size}/${PATTERN_REGISTRY.length} 种形态 · 命中 ${hits.length} 只 · 引擎 ${engine}`;

      const checks = filteredRegistry.map(p => {
        const on = selectedPatterns.has(p.id);
        return `<label class="pattern-check${on ? " active" : ""}">
          <input type="checkbox" data-pid="${p.id}" ${on ? "checked" : ""} />
          <span>${p.name}${p.pure_python ? "" : " *"}</span>
        </label>`;
      }).join("");

      const rows = hits.map(s => {
        const ph = stockPatternHits(s);
        const tags = ph.map(p =>
          `<span class="tag ${p.signal > 0 ? "buy" : "sell"}">${p.name} (${p.signal_label})</span>`).join("");
        return `<div class="card stock-card">
          <div class="stock-header">
            <div><span class="stock-title">${s.name}</span><span class="stock-code">${s.code}</span></div>
            <span class="price-badge ${pctClass(s.latest?.change_pct)}">${fmtPct(s.latest?.change_pct)}</span>
          </div>
          <div class="tags">${tags}</div>
        </div>`;
      }).join("");

      document.getElementById("patterns-panel").innerHTML = `
        <div class="card">
          <h2>自选 K 线形态（61 种，* 需安装 TA-Lib）</h2>
          <p style="font-size:0.78rem;color:var(--muted);margin-bottom:12px">
            勾选要关注的形态，筛选结果保存在浏览器本地。修改扫描范围请编辑 <code>data/pattern_selection.json</code> 后重新 build。
          </p>
          <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px">
            <button class="pattern-preset" data-preset="all">全选</button>
            <button class="pattern-preset" data-preset="none">清空</button>
            <button class="pattern-preset" data-preset="classic">经典12形态</button>
            <button class="pattern-preset" data-preset="bullish">看涨常用</button>
            <select id="pattern-signal-filter" class="toolbar-select">
              <option value="all"${patternSignalFilter==="all"?" selected":""}>全部信号</option>
              <option value="bullish"${patternSignalFilter==="bullish"?" selected":""}>只看买入</option>
              <option value="bearish"${patternSignalFilter==="bearish"?" selected":""}>只看卖出</option>
            </select>
            <input class="toolbar-select" id="pattern-search" placeholder="搜索形态名称…" value="${patternSearch.replace(/"/g,"&quot;")}" />
          </div>
          <div class="pattern-grid">${checks}</div>
        </div>
        ${rows || `<div class="card"><p style="color:var(--muted);text-align:center;padding:24px">无匹配形态。请勾选形态或运行 scanner 更新数据。</p></div>`}`;

      document.querySelectorAll(".pattern-check input").forEach(inp => {
        inp.addEventListener("change", () => {
          const pid = inp.dataset.pid;
          if (inp.checked) selectedPatterns.add(pid); else selectedPatterns.delete(pid);
          savePatternFilter(); renderPatterns();
        });
      });
      document.querySelectorAll(".pattern-preset").forEach(btn => {
        btn.addEventListener("click", () => {
          const p = btn.dataset.preset;
          if (p === "all") selectedPatterns = new Set(PATTERN_REGISTRY.map(x => x.id));
          else if (p === "none") selectedPatterns = new Set();
          else if (p === "classic") selectedPatterns = new Set([
            "hammer","engulfing","morning_star","evening_star","three_white_soldiers",
            "three_black_crows","dark_cloud_cover","piercing","doji","shooting_star","harami","marubozu"
          ]);
          else if (p === "bullish") selectedPatterns = new Set(
            PATTERN_REGISTRY.filter(x => x.category === "看涨" || x.category === "双向").map(x => x.id)
          );
          savePatternFilter(); renderPatterns();
        });
      });
      const sf = document.getElementById("pattern-signal-filter");
      if (sf) sf.addEventListener("change", e => { patternSignalFilter = e.target.value; savePatternFilter(); renderPatterns(); });
      const ps = document.getElementById("pattern-search");
      if (ps) ps.addEventListener("input", e => { patternSearch = e.target.value; renderPatterns(); });
    }

    function renderKlineChart(report) {
      const el = document.getElementById("kline-chart");
      if (!el || typeof echarts === "undefined" || !report?.klines?.length) return;
      if (klineChart) { klineChart.dispose(); klineChart = null; }
      klineChart = echarts.init(el, "dark");
      const kl = report.klines;
      const dates = kl.map(k => k.date);
      const ohlc = kl.map(k => [k.open, k.close, k.low, k.high]);
      const bbiData = kl.map(k => k.bbi);
      const vols = kl.map(k => k.volume);
      klineChart.setOption({
        backgroundColor: "transparent",
        animation: false,
        tooltip: { trigger: "axis", axisPointer: { type: "cross" } },
        legend: { data: ["K线", "BBI"], textStyle: { color: "#8b95a8" }, top: 0 },
        grid: [{ left: 50, right: 20, top: 40, height: "58%" }, { left: 50, right: 20, top: "72%", height: "18%" }],
        xAxis: [
          { type: "category", data: dates, gridIndex: 0, axisLabel: { color: "#8b95a8", fontSize: 10 } },
          { type: "category", data: dates, gridIndex: 1, axisLabel: { show: false } },
        ],
        yAxis: [
          { scale: true, gridIndex: 0, splitLine: { lineStyle: { color: "rgba(255,255,255,0.06)" } }, axisLabel: { color: "#8b95a8" } },
          { scale: true, gridIndex: 1, splitLine: { show: false }, axisLabel: { show: false } },
        ],
        dataZoom: [{ type: "inside", xAxisIndex: [0, 1], start: 50, end: 100 }],
        series: [
          {
            name: "K线", type: "candlestick", xAxisIndex: 0, yAxisIndex: 0, data: ohlc,
            itemStyle: { color: "#ef4444", color0: "#22c55e", borderColor: "#ef4444", borderColor0: "#22c55e" },
          },
          {
            name: "BBI", type: "line", xAxisIndex: 0, yAxisIndex: 0, data: bbiData,
            smooth: true, lineStyle: { width: 2, color: "#eab308" }, showSymbol: false,
          },
          {
            name: "成交量", type: "bar", xAxisIndex: 1, yAxisIndex: 1, data: vols,
            itemStyle: { color: "rgba(56,189,248,0.35)" },
          },
        ],
      });
    }

          <div class="metric-card">

    function renderKlinePhases(report) {
      const active = (report.phase || {}).id;
      return (report.phase_history || []).map(p => `
        <div class="phase-card ${p.signal}${active === p.id ? " active-phase" : ""}">
          <div class="phase-head">

            ${p.range ? `<span class="phase-range">${p.range}</span>` : ""}
          </div>
          <div class="tags" style="margin-bottom:10px">${(p.tags || []).map(t => signalTag(t, p.signal === "bull" ? "buy" : (p.signal === "bear" ? "sell" : "warn"))).join("")}</div>
          <ol style="padding-left:1.2rem;font-size:0.82rem;color:#9ca8bc">${(p.analysis || []).map(a => `<li style="margin-bottom:6px">${a}</li>`).join("")}</ol>

      const ev = report.bbi_events || {};

          <h2>BBI 指标规则</h2>

            K 线持续在 BBI 上方为中期多头；跌破 BBI 为中期空头；大阴线一次性下穿 BBI 为趋势反转强信号。

            <div class="metric-sub">近 52 周深度回调踩线后收阳</div>
          </div>
        </div>
        ${cross.length ? `

    function renderKlineLevels(report) {

      const row = (items, kind) => (items || []).map(it => `
        <tr><td>${signalTag(it.label, kind === "r" ? "sell" : "buy")}</td>
        <td><strong>${it.price ?? "—"}</strong></td>
        <td>${it.note || ""}</td>
        <td>${it.distance_pct != null ? (it.distance_pct >= 0 ? "+" : "") + it.distance_pct + "%" : "—"}</td></tr>`).join("");
      const sig = report.signals?.candle || {};
      return `
        <div class="grid-2">
          <div class="table-wrap"><div style="padding:14px 18px;border-bottom:1px solid var(--border)"><h2>压力区间（由上至下）</h2></div>
          <div class="table-scroll"><table class="level-table"><thead><tr><th>级别</th><th>价格</th><th>解读</th><th>距现价</th></tr></thead>

          <div class="table-wrap"><div style="padding:14px 18px;border-bottom:1px solid var(--border)"><h2>支撑区间（由近及远）</h2></div>
          <div class="table-scroll"><table class="level-table"><thead><tr><th>级别</th><th>价格</th><th>解读</th><th>距现价</th></tr></thead>
          <tbody>${row(lv.support, "s") || "<tr><td colspan='4' style='color:var(--muted)'>—</td></tr>"}</tbody></table></div></div>
        </div>
        <div class="card" style="margin-top:16px">
          <h2>最新 K 线结构</h2>
          <div class="tags">
            ${signalTag(sig.type || "—", "neutral")}
            ${sig.body_ratio != null ? signalTag(`实体占比 ${(sig.body_ratio * 100).toFixed(0)}%`, "neutral") : ""}
            ${sig.volume_ratio != null ? signalTag(`量比 ${sig.volume_ratio}`, sig.volume_ratio > 1.2 ? "warn" : "neutral") : ""}
          </div>
        </div>`;
    }

    function renderKlineSignals(report) {
      const s = report.signals || {};
      const bear = s.bear || {};
      const bull = s.bull || {};
      const rc = s.risk_control || {};
      const list = (arr) => (arr || []).map(x => `<li>${x}</li>`).join("");
      return `
        <div class="grid-2">
          <div class="signal-box bear">
            <h4>空头信号 ${bear.triggered ? signalTag("已触发", "sell") : signalTag("未触发", "neutral")}</h4>
            <ul>${list(bear.reasons)}</ul>
            <p style="margin-top:10px;font-size:0.82rem;color:var(--muted)">${bear.conclusion || ""}</p>
          </div>
          <div class="signal-box bull">
            <h4>多头修复条件 ${bull.partial_met ? signalTag("部分满足", "buy") : signalTag("待满足", "warn")}</h4>
            <ul>${list(bull.conditions)}</ul>
            <p style="margin-top:10px;font-size:0.82rem;color:var(--muted)">${bull.conclusion || ""}</p>
          </div>
        </div>
        <div class="grid-2" style="margin-top:16px">
          <div class="card"><h2>持仓投资者</h2><ul class="report-section" style="list-style:none">${list(rc.holder)}</ul></div>
          <div class="card"><h2>空仓观望</h2><ul class="report-section" style="list-style:none">${list(rc.empty)}</ul></div>
        </div>
        <div class="card" style="margin-top:16px;border-color:rgba(234,179,8,0.25)">
          <h2>风险提示</h2>
          <ul class="report-section">${list(s.warnings)}</ul>
        </div>`;
    }

    function renderKlineBbi() {
      const wb = DATA.weekly_bbi || {};
      const reports = (wb.reports || []).filter(r => r.ok);
      const report = getKlineReport();

      const symOpts = (wb.reports || []).map(r =>
        `<option value="${r.code}"${r.code === klineSymbol ? " selected" : ""}>${r.name || r.code} (${r.code})${r.ok ? "" : " · 无数据"}</option>`
      ).join("");

      const subTabs = [
        { id: "overview", label: "① 基础概览" },
        { id: "bbi", label: "② BBI 趋势" },
        { id: "levels", label: "③ 关键区间" },
        { id: "signals", label: "④ 交易信号" },
      ];

      if (!report?.ok) {
        document.getElementById("klinebbi-panel").innerHTML = `
          <div class="toolbar">
            <select id="kline-symbol-select">${symOpts || "<option>515080</option>"}</select>
          </div>
          <p style="text-align:center;color:var(--muted);padding:40px">暂无周线 BBI 数据。请运行 <code>python weekly_bbi_report.py</code></p>`;
        bindKlineToolbar();
        return;
      }

      let body = "";
      if (klineSubView === "overview") body = renderKlineOverview(report);
      else if (klineSubView === "bbi") body = renderKlineBbiPanel(report);
      else if (klineSubView === "levels") body = renderKlineLevels(report);
      else body = renderKlineSignals(report);

      document.getElementById("stats-bar").textContent =
        `${report.name} (${report.code}) · 周线 · BBI ${report.overview?.current_bbi ?? "—"} · ${report.phase?.name || ""} · 更新 ${(wb.generated_at || "").slice(0, 10)}`;

      document.getElementById("klinebbi-panel").innerHTML = `
        <div class="toolbar">
          <select id="kline-symbol-select">${symOpts}</select>
          <div class="kline-subtabs">${subTabs.map(t =>
            `<button type="button" class="kline-subtab${klineSubView === t.id ? " active" : ""}" data-sub="${t.id}">${t.label}</button>`
          ).join("")}</div>
        </div>
        ${body}`;

      bindKlineToolbar();
      if (klineSubView === "overview") {
        requestAnimationFrame(() => renderKlineChart(report));
      }
    }

    function bindKlineToolbar() {
      const sel = document.getElementById("kline-symbol-select");
      if (sel) sel.addEventListener("change", e => { klineSymbol = e.target.value; renderKlineBbi(); });
      document.querySelectorAll(".kline-subtab").forEach(btn => {
        btn.addEventListener("click", () => { klineSubView = btn.dataset.sub; renderKlineBbi(); });
      });
    }

    function renderBacktest() {
      const summary = DATA.backtest?.summary || [];
      const stocks = DATA.backtest?.stock_results || [];
      document.getElementById("stats-bar").textContent =
        `回测 ${summary.length} 种策略 · 持有期/止盈止损见 config.yaml`;
      const sumTable = summary.length ? `
        <table><thead><tr><th>策略</th><th>交易</th><th>胜率</th><th>盈亏比</th><th>均收益</th><th>综合分</th></tr></thead><tbody>
        ${summary.map(s => `
          <tr><td>${s.name}</td><td>${s.trades}</td>
          <td style="color:${s.win_rate >= 50 ? "var(--green)" : "var(--red)"}">${s.win_rate}%</td>
          <td style="color:${s.profit_factor >= 1.2 ? "var(--green)" : "var(--yellow)"}">${s.profit_factor ?? "—"}</td>
          <td class="${pctClass(s.avg_return_pct)}">${fmtPct(s.avg_return_pct)}</td>
          <td>${s.score ?? "—"}</td></tr>`).join("")}
        </tbody></table>` : `<p style="padding:20px;color:var(--muted)">暂无回测数据</p>`;

      const stockTable = stocks.length ? `
        <table><thead><tr><th>股票</th><th>策略</th><th>交易</th><th>胜率</th><th>盈亏比</th><th>均收益</th></tr></thead><tbody>
        ${stocks.map(s => `
          <tr><td>${s.name} (${s.code})</td><td>${s.strategy}</td><td>${s.trades}</td>
          <td>${s.win_rate}%</td><td>${s.profit_factor ?? "—"}</td>
          <td class="${pctClass(s.avg_return_pct)}">${fmtPct(s.avg_return_pct)}</td></tr>`).join("")}
        </tbody></table>` : "";

      document.getElementById("backtest-panel").innerHTML = `
        <div class="table-wrap"><div style="padding:16px 20px;border-bottom:1px solid var(--border)"><h2>策略汇总</h2></div>
        <div class="table-scroll">${sumTable}</div></div>
        ${stockTable ? `<div class="table-wrap"><div style="padding:16px 20px;border-bottom:1px solid var(--border)"><h2>个股明细</h2></div>
        <div class="table-scroll">${stockTable}</div></div>` : ""}
        <div class="card"><p style="font-size:0.82rem;color:var(--muted)">
          回测逻辑：信号日收盘买入，持有 5 日；止损 -6%、止盈 +12%、移动止损 -5%。
          入场需综合分 ≥ 65。盈亏比 = 平均盈利 / 平均亏损。
        </p></div>`;
    }

    function switchView(view) {
      activeView = view;
      document.querySelectorAll(".view-tab").forEach(b => b.classList.toggle("active", b.dataset.view === view));
      ["market", "fundflow", "sector20", "picks", "indicators", "patterns", "klinebbi", "backtest"].forEach(v => {
        document.getElementById(v + "-panel").classList.toggle("active", v === view);
      });
      document.getElementById("stats-bar").style.display = (view === "market" || view === "fundflow" || view === "sector20") ? "none" : "block";
      if (view === "market") renderMarket();
      else if (view === "fundflow") renderFundFlow();
      else if (view === "sector20") renderSector20();
      else if (view === "picks") renderPicks();
      else if (view === "indicators") renderIndicators();
      else if (view === "patterns") renderPatterns();
      else if (view === "klinebbi") renderKlineBbi();
      else renderBacktest();
    }

    document.querySelectorAll(".view-tab").forEach(btn => {
      btn.addEventListener("click", () => switchView(btn.dataset.view));
    });

    renderMetrics();
    renderMarket();
  </script>
</body>
</html>
