      return `<div class="spark-row">${vals.map(v => {
        const h = Math.max(Math.round(Math.abs(v) / max * 32), 2);
        return `<div class="spark-bar ${v >= 0 ? "pos" : "neg"}" style="height:${h}px" title="${v}亿"></div>`;
      }).join("")}</div>`;
    }

    function renderSector20Table(board) {
      const top = board?.top || [];
      if (!top.length) return `<p style="color:var(--muted);padding:20px">暂无板块数据，请运行 sync_sector_flow.py</p>`;
      const maxTotal = Math.max(...top.map(t => Math.abs(t.total_main_yi || 0)), 1);
      return `<table class="rank-table"><thead><tr>
        <th>排名</th><th>板块</th><th>近20日主力净流入</th><th>近5日</th><th>今日</th><th>涨跌%</th><th>20日走势</th>
      </thead><tbody>
      ${top.map(item => {
        const rankCls = item.rank <= 3 ? " gold" : "";
        const total = item.total_main_yi ?? 0;
        const w = Math.max(Math.round(Math.abs(total) / maxTotal * 100), 8);
        const totalColor = total >= 0 ? "var(--rise)" : "var(--fall)";
        const today = item.today_main_yi;
        const r5 = item.recent5_main_yi;
        return `<tr>
          <td><span class="rank-num${rankCls}">${item.rank}</span></td>
          <td><strong>${item.name}</strong><div style="font-size:0.7rem;color:var(--muted)">${item.code || ""}</div></td>
          <td>
            <div style="font-weight:800;color:${totalColor}">${total >= 0 ? "+" : ""}${total} 亿</div>
            <div class="flow-hbar-track" style="height:8px;margin-top:4px"><div class="flow-hbar-fill ${total >= 0 ? "in" : "out"}" style="width:${w}%;height:100%"></div></div>
          </td>
          <td class="${r5 >= 0 ? "up" : "down"}" style="font-weight:600">${r5 != null ? (r5 >= 0 ? "+" : "") + r5 + "亿" : "—"}</td>
          <td class="${(today || 0) >= 0 ? "up" : "down"}">${today != null ? (today >= 0 ? "+" : "") + today + "亿" : "—"}</td>
          <td class="${pctClass(item.change_pct)}">${item.change_pct != null ? (item.change_pct >= 0 ? "+" : "") + item.change_pct + "%" : "—"}</td>
          <td>${renderSparkline(item.series)}<div style="font-size:0.68rem;color:var(--muted)">${(item.series||[]).length}日样本</div></td>
        </tr>`;
      }).join("")}
      </tbody></table>`;
    }

    function renderSector20() {
      const data = DATA.sector_flow_20d || {};
      const board = sector20Board === "concept" ? data.concept : data.industry;
      const dr = data.date_range || {};
      const label = board?.board_label || (sector20Board === "concept" ? "概念" : "行业");
      const scanned = board?.count_scanned ?? 0;

      document.getElementById("sector20-panel").innerHTML = `
        <div class="card">
          <div class="section-title">
            <span>近 ${data.days || 20} 日 · 十大${label}主力净流入排行</span>
            <a href="https://hhxg.top" target="_blank" rel="noopener">恢恢量化 →</a>
          </div>
          <p style="font-size:0.82rem;color:var(--muted);margin-bottom:12px">
            数据区间 ${dr.start || "—"} ~ ${dr.end || "—"} · 来源东方财富 · 扫描 ${scanned} 个${label}板块
          </p>
          <div class="board-toggle">
            <button class="${sector20Board === "industry" ? "active" : ""}" data-board="industry">行业 TOP10</button>
            <button class="${sector20Board === "concept" ? "active" : ""}" data-board="concept">概念 TOP10</button>
          </div>
          <div class="table-scroll">${renderSector20Table(board)}</div>
        </div>
        <div class="card">
          <p style="font-size:0.8rem;color:var(--muted);line-height:1.6">
            <strong>说明：</strong>主力净流入 = 超大单 + 大单净流入合计（东财口径）。
            近20日累计反映中线资金偏好（东财 f180 口径）；近5日/近10日列可对照短期动能。
            迷你走势图为近几个交易日日度主力净流入（红入绿出）。
          </p>
        </div>`;

      document.querySelectorAll("#sector20-panel .board-toggle button").forEach(btn => {
        btn.addEventListener("click", () => {
          sector20Board = btn.dataset.board;
          renderSector20();
        });
      });
    }

    function factorBar(name, score) {
      if (score == null || score === undefined || score === "") {
        return `<div class="ind-item"><div class="ind-val">—</div><div class="ind-label">${name}</div></div>`;
      }
      const s = Number(score) || 0;
      return `<div class="ind-item">
        <div class="ind-val">${s.toFixed(0)}</div>
        <div class="ind-label">${name}</div>
        <div class="score-bar" style="margin-top:6px"><div class="score-track"><div class="score-fill" style="width:${s}%"></div></div></div>
      </div>`;
    }

    function renderStockCard(stock, showInd = false) {
      const l = stock.latest || {};
      const chg = l.change_pct;
      const strategies = stock.strategies || [];
      const sig = l.signals || {};
      const mf = stock.multi_factor || {};
      const factors = mf.factors || {};
      const factorLabels = { momentum: "动能", volume: "量能", trend: "趋势", pullback: "回调", reversal: "反转" };
      return `
        <div class="card stock-card">
          <div class="stock-header">
            <div>
              <span class="stock-title">${stock.name}</span>
              <span class="stock-code">${stock.code}</span>
              ${mf.composite_score != null ? `<span class="composite-badge">综合 ${mf.composite_score} · ${mf.signal_strength || ""}</span>` : ""}
            </div>
            <div>
              <span class="price-badge ${pctClass(chg)}">${l.close ?? "—"}</span>
              <span class="price-badge ${pctClass(chg)}" style="margin-left:6px;font-size:0.9rem">${fmtPct(chg)}</span>
            </div>
          </div>
          ${Object.keys(factors).length ? `<div class="player-chips" style="margin-top:8px">${Object.entries(factors).map(([k,v]) =>
            `<span class="factor-chip">${factorLabels[k] || k} ${Number(v).toFixed(0)}${mf.estimated ? "≈" : ""}</span>`).join("")}${mf.estimated ? `<span class="factor-chip" style="opacity:0.7">估算</span>` : ""}</div>` : ""}
          ${(stock.pattern_hits || []).length ? `<div class="tags">${(stock.pattern_hits || []).map(p =>
            `<span class="tag ${p.signal > 0 ? "buy" : "sell"}">${p.name} · ${p.signal_label}</span>`).join("")}</div>` : ""}
          ${strategies.length ? `<div class="tags">${strategies.map(s =>
            `<span class="tag buy">${s.name} · ${s.score}分</span>`).join("")}</div>
            <div class="reason">${strategies[0].reason || ""}</div>` : `<div class="tags"><span class="tag neutral">暂无策略命中</span></div>`}
          ${showInd ? `
          <div class="ind-grid">
            ${factorBar("动能", factors.momentum)}
            ${factorBar("量能", factors.volume)}
            ${factorBar("趋势", factors.trend)}
            ${factorBar("回调", factors.pullback)}
            ${factorBar("反转", factors.reversal)}
            <div class="ind-item"><div class="ind-val">${l.kdj_k?.toFixed?.(1) ?? "—"}</div><div class="ind-label">KDJ-K ${sig.kdj || ""}</div></div>
            <div class="ind-item"><div class="ind-val">${l.rsi6?.toFixed?.(1) ?? "—"}</div><div class="ind-label">RSI6 ${sig.rsi || ""}</div></div>
            <div class="ind-item"><div class="ind-val">${l.macd_dif?.toFixed?.(3) ?? "—"}</div><div class="ind-label">MACD ${sig.macd || ""}</div></div>
            <div class="ind-item"><div class="ind-val">${l.volume_ratio?.toFixed?.(2) ?? "—"}</div><div class="ind-label">量比</div></div>
          </div>` : ""}
        </div>`;
    }

    function renderPicks() {
      const picks = (DATA.scan?.picks || []).filter(s => {
        if (!pickSearch.trim()) return true;
        const q = pickSearch.trim().toLowerCase();
        return (s.name || "").toLowerCase().includes(q) || (s.code || "").includes(q);
      });
      document.getElementById("stats-bar").textContent =
        `多因子选股 ${picks.length} 只 · 涨停回调 / 高动能 / 多因子共振 + 经典策略`;
      document.getElementById("picks-panel").innerHTML = `
        <div class="toolbar">
          <input type="search" id="pick-search" placeholder="搜索股票代码或名称…" value="${pickSearch.replace(/"/g, "&quot;")}" />
        </div>
        ${picks.length ? picks.map(s => renderStockCard(s)).join("") :
          `<div class="card"><p style="color:var(--muted);text-align:center;padding:24px">当前无策略命中，可扩大 watchlist 或等待行情触发</p></div>`}`;
      const el = document.getElementById("pick-search");
      if (el) el.addEventListener("input", e => { pickSearch = e.target.value; renderPicks(); });
    }

    function renderIndicators() {
      const all = (DATA.scan?.all_results || []).filter(s => {
        if (!indSearch.trim()) return true;
        const q = indSearch.trim().toLowerCase();
        return (s.name || "").toLowerCase().includes(q) || (s.code || "").includes(q);
      });
      document.getElementById("stats-bar").textContent = `共 ${all.length} 只 · 五维因子：动能/量能/趋势/回调/反转`;
      document.getElementById("indicators-panel").innerHTML = `
        <div class="toolbar">
          <input type="search" id="ind-search" placeholder="搜索股票…" value="${indSearch.replace(/"/g, "&quot;")}" />
        </div>
        ${all.map(s => renderStockCard(s, true)).join("")}`;
      const el = document.getElementById("ind-search");
      if (el) el.addEventListener("input", e => { indSearch = e.target.value; renderIndicators(); });
    }

    function savePatternFilter() {
      localStorage.setItem(LS_KEY, JSON.stringify([...selectedPatterns]));
      localStorage.setItem("stock_quant_pattern_signal", patternSignalFilter);
    }

    function stockPatternHits(stock) {
      return (stock.pattern_hits || []).filter(h => selectedPatterns.has(h.id));
    }

    function renderPatterns() {
      const all = DATA.scan?.all_results || [];
      const engine = DATA.meta?.talib_available ? "TA-Lib 全量" : "纯Python子集";
      const filteredRegistry = PATTERN_REGISTRY.filter(p =>
        !patternSearch.trim() || p.name.includes(patternSearch) || p.id.includes(patternSearch)
      );

      const hits = all.filter(s => {
        const ph = stockPatternHits(s);
        if (!ph.length) return false;
        if (patternSignalFilter === "bullish") return ph.some(h => h.signal > 0);
        if (patternSignalFilter === "bearish") return ph.some(h => h.signal < 0);
        return true;
      });

      document.getElementById("stats-bar").textContent =
        `已选 ${selectedPatterns.size}/${PATTERN_REGISTRY.length} 种形态 · 命中 ${hits.length} 只 · 引擎 ${engine}`;

      const checks = filteredRegistry.map(p => {
        const on = selectedPatterns.has(p.id);
        return `<label class="pattern-check${on ? " active" : ""}">
          <input type="checkbox" data-pid="${p.id}" ${on ? "checked" : ""} />
          <span>${p.name}${p.pure_python ? "" : " *"}</span>
        </label>`;
      }).join("");

      const rows = hits.map(s => {
        const ph = stockPatternHits(s);
        const tags = ph.map(p =>
          `<span class="tag ${p.signal > 0 ? "buy" : "sell"}">${p.name} (${p.signal_label})</span>`).join("");
        return `<div class="card stock-card">
          <div class="stock-header">
            <div><span class="stock-title">${s.name}</span><span class="stock-code">${s.code}</span></div>
            <span class="price-badge ${pctClass(s.latest?.change_pct)}">${fmtPct(s.latest?.change_pct)}</span>
          </div>
          <div class="tags">${tags}</div>
        </div>`;
      }).join("");

      document.getElementById("patterns-panel").innerHTML = `
        <div class="card">
          <h2>自选 K 线形态（61 种，* 需安装 TA-Lib）</h2>
          <p style="font-size:0.78rem;color:var(--muted);margin-bottom:12px">
            勾选要关注的形态，筛选结果保存在浏览器本地。修改扫描范围请编辑 <code>data/pattern_selection.json</code> 后重新 build。
          </p>
          <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px">
            <button class="pattern-preset" data-preset="all">全选</button>
            <button class="pattern-preset" data-preset="none">清空</button>
            <button class="pattern-preset" data-preset="classic">经典12形态</button>
            <button class="pattern-preset" data-preset="bullish">看涨常用</button>
            <select id="pattern-signal-filter" class="toolbar-select">
              <option value="all"${patternSignalFilter==="all"?" selected":""}>全部信号</option>
              <option value="bullish"${patternSignalFilter==="bullish"?" selected":""}>只看买入</option>
              <option value="bearish"${patternSignalFilter==="bearish"?" selected":""}>只看卖出</option>
            </select>
            <input class="toolbar-select" id="pattern-search" placeholder="搜索形态名称…" value="${patternSearch.replace(/"/g,"&quot;")}" />
          </div>
          <div class="pattern-grid">${checks}</div>
        </div>
        ${rows || `<div class="card"><p style="color:var(--muted);text-align:center;padding:24px">无匹配形态。请勾选形态或运行 scanner 更新数据。</p></div>`}`;

      document.querySelectorAll(".pattern-check input").forEach(inp => {
        inp.addEventListener("change", () => {
          const pid = inp.dataset.pid;
          if (inp.checked) selectedPatterns.add(pid); else selectedPatterns.delete(pid);
          savePatternFilter(); renderPatterns();
        });
      });
      document.querySelectorAll(".pattern-preset").forEach(btn => {
        btn.addEventListener("click", () => {
          const p = btn.dataset.preset;
          if (p === "all") selectedPatterns = new Set(PATTERN_REGISTRY.map(x => x.id));
          else if (p === "none") selectedPatterns = new Set();
          else if (p === "classic") selectedPatterns = new Set([
            "hammer","engulfing","morning_star","evening_star","three_white_soldiers",
            "three_black_crows","dark_cloud_cover","piercing","doji","shooting_star","harami","marubozu"
          ]);
          else if (p === "bullish") selectedPatterns = new Set(
            PATTERN_REGISTRY.filter(x => x.category === "看涨" || x.category === "双向").map(x => x.id)
          );
          savePatternFilter(); renderPatterns();
        });
      });
      const sf = document.getElementById("pattern-signal-filter");
      if (sf) sf.addEventListener("change", e => { patternSignalFilter = e.target.value; savePatternFilter(); renderPatterns(); });
      const ps = document.getElementById("pattern-search");
      if (ps) ps.addEventListener("input", e => { patternSearch = e.target.value; renderPatterns(); });
    }

    function renderBacktest() {
      const summary = DATA.backtest?.summary || [];
      const stocks = DATA.backtest?.stock_results || [];
      document.getElementById("stats-bar").textContent =
        `回测 ${summary.length} 种策略 · 持有期/止盈止损见 config.yaml`;
      const sumTable = summary.length ? `
        <table><thead><tr><th>策略</th><th>交易</th><th>胜率</th><th>盈亏比</th><th>均收益</th><th>综合分</th></tr></thead><tbody>
        ${summary.map(s => `
          <tr><td>${s.name}</td><td>${s.trades}</td>
          <td style="color:${s.win_rate >= 50 ? "var(--green)" : "var(--red)"}">${s.win_rate}%</td>
          <td style="color:${s.profit_factor >= 1.2 ? "var(--green)" : "var(--yellow)"}">${s.profit_factor ?? "—"}</td>
          <td class="${pctClass(s.avg_return_pct)}">${fmtPct(s.avg_return_pct)}</td>
          <td>${s.score ?? "—"}</td></tr>`).join("")}
        </tbody></table>` : `<p style="padding:20px;color:var(--muted)">暂无回测数据</p>`;

      const stockTable = stocks.length ? `
        <table><thead><tr><th>股票</th><th>策略</th><th>交易</th><th>胜率</th><th>盈亏比</th><th>均收益</th></tr></thead><tbody>
        ${stocks.map(s => `
          <tr><td>${s.name} (${s.code})</td><td>${s.strategy}</td><td>${s.trades}</td>
          <td>${s.win_rate}%</td><td>${s.profit_factor ?? "—"}</td>
          <td class="${pctClass(s.avg_return_pct)}">${fmtPct(s.avg_return_pct)}</td></tr>`).join("")}
        </tbody></table>` : "";

      document.getElementById("backtest-panel").innerHTML = `
        <div class="table-wrap"><div style="padding:16px 20px;border-bottom:1px solid var(--border)"><h2>策略汇总</h2></div>
        <div class="table-scroll">${sumTable}</div></div>
        ${stockTable ? `<div class="table-wrap"><div style="padding:16px 20px;border-bottom:1px solid var(--border)"><h2>个股明细</h2></div>
        <div class="table-scroll">${stockTable}</div></div>` : ""}
        <div class="card"><p style="font-size:0.82rem;color:var(--muted)">
          回测逻辑：信号日收盘买入，持有 5 日；止损 -6%、止盈 +12%、移动止损 -5%。
          入场需综合分 ≥ 65。盈亏比 = 平均盈利 / 平均亏损。
        </p></div>`;
    }

    function switchView(view) {
      activeView = view;
      document.querySelectorAll(".view-tab").forEach(b => b.classList.toggle("active", b.dataset.view === view));
      ["market", "fundflow", "sector20", "picks", "indicators", "patterns", "backtest"].forEach(v => {
        document.getElementById(v + "-panel").classList.toggle("active", v === view);
      });
      document.getElementById("stats-bar").style.display = (view === "market" || view === "fundflow" || view === "sector20") ? "none" : "block";
      if (view === "market") renderMarket();
      else if (view === "fundflow") renderFundFlow();
      else if (view === "sector20") renderSector20();
      else if (view === "picks") renderPicks();
      else if (view === "indicators") renderIndicators();
      else if (view === "patterns") renderPatterns();
      else renderBacktest();
    }

    document.querySelectorAll(".view-tab").forEach(btn => {
      btn.addEventListener("click", () => switchView(btn.dataset.view));
    });

    renderMetrics();
    renderMarket();
  </script>
</body>
</html>
