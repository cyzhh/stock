name: 构建并部署 GitHub Pages

on:
  push:
    branches: [main, master]
  schedule:
    # 交易日盘后重建（UTC 13:00 ≈ 北京 21:00）
    - cron: "0 13 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 构建量化看板
        run: python build_all.py

      - name: 打包静态站点
        run: |
          mkdir -p _site
          cp index.html _site/
          touch _site/.nojekyll
          echo "Deployed at $(date -u +%Y-%m-%dT%H:%M:%SZ)" > _site/build.txt

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
